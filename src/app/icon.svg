<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <style>
    .f{fill:#0f172a}
    .s{stroke:#0f172a;fill:none}
    @media(prefers-color-scheme:dark){.f{fill:#f8fafc}.s{stroke:#f8fafc}}
  </style>
  <!-- Baseline -->
  <line class="s" x1="2" y1="16" x2="21" y2="16" stroke-width="0.5" opacity="0.2"/>
  <!-- Wave path -->
  <path class="s" d="M3,21 C5,21 8,11 11,11 C14,11 17,20 20,20 C22,19 24,17 26,16"
        stroke-width="1" opacity="0.3" stroke-linecap="round"/>
  <!-- Dots -->
  <circle class="f" cx="3" cy="21" r="1.8"/>
  <circle class="f" cx="11" cy="11" r="1.5"/>
  <circle class="f" cx="20" cy="20" r="1.5"/>
  <!-- North star -->
  <circle class="f" cx="26" cy="16" r="3.5"/>
  <circle class="s" cx="26" cy="16" r="5.5" stroke-width="0.7" opacity="0.25"/>
</svg>
